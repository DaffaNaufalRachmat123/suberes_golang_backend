# .github/workflows/deploy.yml
name: Build & Deploy

on:
  push:
    branches:
      - main
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/suberes-api

jobs:
  # ── 1. Test ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repository structure
        run: |
          pwd
          ls -la
          echo "----"
          cat go.mod || true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out

  # ── 2. Build & Push Docker Image ──────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          build-args: |
            APP_VERSION=${{ github.sha }}

  # ── 3. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3

        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

          DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}

          STAG_ADMIN_USERNAME: ${{ secrets.STAG_ADMIN_USERNAME }}
          STAG_ADMIN_PASSWORD: ${{ secrets.STAG_ADMIN_PASSWORD }}

          PROD_ADMIN_USERNAME: ${{ secrets.PROD_ADMIN_USERNAME }}
          PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT }}

          envs: IMAGE_TAG,REGISTRY,IMAGE_NAME,DEPLOY_ENV,SSL_EMAIL,STAG_ADMIN_USERNAME,STAG_ADMIN_PASSWORD,PROD_ADMIN_USERNAME,PROD_ADMIN_PASSWORD

          script: |
            set -euo pipefail

            cd /opt/suberes

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            DEPLOY_ENV="${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}" \
            COMPOSE_FILE="/opt/suberes/docker-compose.${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}.yml" \
            bash deploy/provision_infra.sh

            IMAGE_TAG="${{ needs.build.outputs.image_tag }}" \
            COMPOSE_FILE="/opt/suberes/docker-compose.${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}.yml" \
            bash deploy/deploy.sh

      # ── Sentry: Production ───────────────────────────────────────────────
      - name: Create Sentry release (production)
        if: github.ref == 'refs/heads/main'

        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_PROD_TOKEN }}

        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            npx @sentry/cli releases new "${{ github.sha }}" --org suberes --project suberes-backend
            npx @sentry/cli releases set-commits "${{ github.sha }}" --auto --org suberes --project suberes-backend
            npx @sentry/cli releases finalize "${{ github.sha }}" --org suberes --project suberes-backend
            npx @sentry/cli releases deploys "${{ github.sha }}" new -e production --org suberes --project suberes-backend
          else
            echo "SENTRY_PROD_TOKEN is empty, skipping..."
          fi

      # ── Sentry: Staging ──────────────────────────────────────────────────
      - name: Create Sentry release (staging)
        if: github.ref == 'refs/heads/staging'

        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_STAGING_TOKEN }}

        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            npx @sentry/cli releases new "${{ github.sha }}" --org suberes --project suberes-backend
            npx @sentry/cli releases set-commits "${{ github.sha }}" --auto --org suberes --project suberes-backend
            npx @sentry/cli releases finalize "${{ github.sha }}" --org suberes --project suberes-backend
            npx @sentry/cli releases deploys "${{ github.sha }}" new -e staging --org suberes --project suberes-backend
          else
            echo "SENTRY_STAGING_TOKEN is empty, skipping..."
          fi