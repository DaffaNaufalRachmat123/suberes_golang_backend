# /etc/nginx/conf.d/host.conf
# ─────────────────────────────────────────────────────────────────────────────
# Host-level Nginx (installed directly on VM, NOT inside Docker).
# This is the single entry point for port 80 and 443.
# It terminates SSL and routes traffic to the correct Docker backend:
#   - staging.suberes.com  → Docker staging  Nginx (http://127.0.0.1:8900)
#   - suberes.com          → Docker production Nginx (http://127.0.0.1:8800)
#
# SETUP STEPS (run once on the VM):
#   1. sudo apt install -y nginx certbot python3-certbot-nginx
#   2. sudo cp /opt/suberes/nginx/conf.d/host.conf /etc/nginx/conf.d/suberes.conf
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo certbot --nginx -d suberes.com -d www.suberes.com -d staging.suberes.com -d www.staging.suberes.com --email support@suberes.com --agree-tos --no-eff-email
#   5. sudo systemctl enable nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Drop connections from unknown/unrecognized domains ────────────────────────
server {
    listen 80  default_server;
    listen [::]:80  default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/suberes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suberes.com/privkey.pem;

    return 444;
}

# ── HTTP → HTTPS redirect for all domains ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name suberes.com www.suberes.com staging.suberes.com www.staging.suberes.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Production: suberes.com ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name suberes.com www.suberes.com;

    ssl_certificate     /etc/letsencrypt/live/suberes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suberes.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}

# ── Staging: staging.suberes.com ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.suberes.com www.staging.suberes.com;

    ssl_certificate     /etc/letsencrypt/live/staging.suberes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.suberes.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:8900;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
