# nginx/conf.d/suberes.conf — virtual host configuration
# Replace `api.suberes.com` and `dashboard.suberes.com` with your real domains.
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.suberes.com dashboard.suberes.com;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — API backend ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.suberes.com;

    # ── SSL certificates (issued by certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.suberes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.suberes.com/privkey.pem;

    # ── Modern TLS configuration ─────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    ssl_trusted_certificate   /etc/letsencrypt/live/api.suberes.com/chain.pem;

    # ── Security headers (defence-in-depth; app also sets these) ─────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req  zone=api burst=20 nodelay;
    limit_conn conn_limit 20;

    # ── Proxy to Go app ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Buffer settings — adjust for large uploads
        proxy_buffering           on;
        proxy_buffer_size         4k;
        proxy_buffers             8 4k;
        proxy_busy_buffers_size   8k;
    }

    # ── Health probes — allow without rate-limit ─────────────────────────────
    location ~ ^/(health|live|ready)$ {
        proxy_pass         http://app:8080;
        proxy_set_header   Host $host;
        access_log         off;
        limit_req          off;
    }

    # ── Block common exploit paths ───────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
