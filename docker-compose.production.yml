# docker-compose.production.yml
# ─────────────────────────────────────────────────────────────────────────────
# Full production stack on a single VPS:
#   nginx (public) → app (internal) → postgres + redis (internal, no public ports)
#
# Security principles enforced here:
#   • Database port NOT exposed to host (internal network only)
#   • Redis port NOT exposed to host
#   • All services communicate via the private `internal` network
#   • App runs as non-root (enforced by Dockerfile)
#   • Resource limits prevent a single container from starving the host
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

name: suberes_production

networks:
  # Only nginx lives on the public-facing bridge; app+db+redis stay internal.
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # ← no outbound internet access for db/redis containers

volumes:
  postgres_data:
  redis_data:

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: suberes_postgres
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "5411:5432"  # expose 5411 on host, map to 5432 in container
    environment:
      POSTGRES_DB:       ${PROD_DATABASE}
      POSTGRES_USER:     ${PROD_USERNAME}
      POSTGRES_PASSWORD: ${PROD_PASSWORD}
      # Performance tuning (adjust to VPS RAM)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROD_USERNAME} -d ${PROD_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis (queue + cache) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: suberes_redis
    restart: unless-stopped
    networks:
      - internal
    command:
      - sh
      - -c
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$REDIS_PASSWORD" --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --save 60 1;
        else
          exec redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --save 60 1;
        fi
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/daffanaufalrachmat123/suberes-api}:${IMAGE_TAG:-latest}
    container_name: suberes_app
    restart: unless-stopped
    networks:
      - internal
    env_file:
      - /opt/suberes/production/.env
    environment:
      APP_ENV:      prod
      REDIS_HOST:   redis
      REDIS_PORT:   "6379"
      PROD_HOST:    postgres
      PROD_PORT:    "5411"
      PROD_SSLMODE: disable
    expose:
      - "8080"   # visible only on `internal` network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
    volumes:
      - /opt/suberes/credential_files_prod:/app/credential_files_prod:ro

  # ── Nginx reverse proxy (only container with public ports) ───────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: suberes_nginx
    restart: unless-stopped
    networks:
      - public
      - internal
    ports:
      - "8800:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/suberes/nginx/conf.d/suberes.prod.conf:/etc/nginx/conf.d/suberes.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Certbot (Let's Encrypt SSL auto-renewal) ─────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: suberes_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    # Run once and exit; renewal is triggered by a host cron job:
    #   0 */12 * * * docker compose -f docker-compose.production.yml run --rm certbot renew
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
