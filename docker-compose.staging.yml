# docker-compose.staging.yml
# ─────────────────────────────────────────────────────────────────────────────
# Staging environment — mirrors production topology but uses a smaller footprint.
# Database is an external managed service (RDS / Cloud SQL / bare-metal Postgres).
#
# Usage:
#   docker compose -f docker-compose.staging.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

name: suberes_staging

networks:
  internal:
    driver: bridge

volumes:
  postgres_data_stag:
  redis_data_stag:
  certbot_www_stag:
  certbot_conf_stag:

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: suberes_postgres_stag
    restart: unless-stopped

    networks:
      - internal

    environment:
      POSTGRES_DB: ${STAG_DATABASE}
      POSTGRES_USER: ${STAG_USERNAME}
      POSTGRES_PASSWORD: ${STAG_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"

    volumes:
      - postgres_data_stag:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAG_USERNAME} -d ${STAG_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/daffanaufalrachmat123/suberes-api:${IMAGE_TAG:-staging}
    container_name: suberes_app_stag
    restart: unless-stopped
    networks:
      - internal
    env_file:
      - /opt/suberes/staging/.env.staging
    environment:
      APP_ENV:      stag
      APP_PORT:     "8081"
      STAG_HOST:    postgres
      STAG_PORT:    "5432"
      STAG_SSLMODE: disable
      REDIS_HOST:   redis
      REDIS_PORT:   "6379"
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    volumes:
      - /opt/suberes/credential_files:/app/credential_files:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Redis (queue + cache) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: suberes_redis_stag
    restart: unless-stopped
    networks:
      - internal
    command:
      - sh
      - -c
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$REDIS_PASSWORD" --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes;
        else
          exec redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes;
        fi
    volumes:
      - redis_data_stag:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: suberes_nginx_stag
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "8900:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/suberes/nginx/conf.d/suberes.staging.conf:/etc/nginx/conf.d/suberes.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  certbot:
    image: certbot/certbot:latest
    container_name: suberes_certbot_stag
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
